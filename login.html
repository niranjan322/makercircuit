<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register - MakerCircuit</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; }
        .auth-container { width: 100%; max-width: 420px; padding: 2.5rem; margin-top: 1rem; }
        .tab-btn { background: none; border: none; font-size: 1.1rem; color: var(--text-secondary); cursor: pointer; padding: 0.5rem 1rem; border-bottom: 2px solid transparent; font-family: var(--font-heading); font-weight: 600; transition: 0.3s; }
        .tab-btn:hover { color: var(--text-primary); }
        .tab-btn.active { color: var(--neon-blue); border-bottom: 2px solid var(--neon-blue); }
        .auth-form { display: none; margin-top: 2rem; }
        .auth-form.active { display: block; animation: fadeIn 0.4s; }
        .error-msg { color: #ff4c4c; font-size: 0.9rem; margin-top: 1rem; text-align: center; }
        .success-msg { color: var(--neon-green); font-size: 0.9rem; margin-top: 1rem; text-align: center; }
        .password-wrapper { position: relative; }
        .password-wrapper input { padding-right: 40px; }
        .toggle-password { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #888; transition: 0.3s; }
        .toggle-password:hover { color: var(--neon-blue); }

        /* ─── OTP Step ─── */
        #otp-step { display: none; margin-top: 2rem; animation: fadeIn 0.4s; }
        #otp-step.active { display: block; }

        .otp-header { text-align: center; margin-bottom: 1.5rem; }
        .otp-header .otp-icon { font-size: 2.8rem; display: block; margin-bottom: 0.5rem; }
        .otp-header h3 { color: var(--text-primary); margin: 0 0 0.4rem; font-size: 1.3rem; }
        .otp-header p { color: var(--text-secondary); font-size: 0.88rem; margin: 0; }
        .otp-header span.otp-email { color: var(--neon-blue); font-weight: 600; }

        .otp-inputs { display: flex; justify-content: center; gap: 10px; margin: 1.5rem 0; }
        .otp-inputs input {
            width: 50px; height: 58px; text-align: center; font-size: 1.5rem;
            font-weight: 700; border: 2px solid rgba(0,212,255,0.25);
            border-radius: 10px; background: rgba(255,255,255,0.04);
            color: var(--text-primary); font-family: var(--font-heading);
            caret-color: var(--neon-blue); transition: border-color 0.3s, box-shadow 0.3s;
            outline: none;
        }
        .otp-inputs input:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 12px rgba(0,212,255,0.3);
        }
        .otp-inputs input.filled { border-color: var(--neon-blue); }

        .otp-timer { text-align: center; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 1rem; }
        .otp-timer span { color: var(--neon-blue); font-weight: 600; }

        .resend-link { display: block; text-align: center; font-size: 0.88rem; color: var(--text-secondary); margin-top: 0.75rem; }
        .resend-link button { background: none; border: none; color: var(--neon-blue); cursor: pointer; font-size: 0.88rem; font-family: inherit; padding: 0; text-decoration: underline; }
        .resend-link button:disabled { color: var(--text-secondary); cursor: default; text-decoration: none; }

        .back-to-login { display: block; text-align: center; margin-top: 1rem; font-size: 0.85rem; }
        .back-to-login a { color: #aaa; text-decoration: none; }
        .back-to-login a:hover { color: var(--text-primary); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25%      { transform: translateX(-6px); }
            75%      { transform: translateX(6px); }
        }
        .shake { animation: shake 0.35s ease; }
    </style>
</head>
<body>
    <a href="index.html" class="logo glow-text-blue" style="font-size: 2.5rem; text-decoration: none;">MakerCircuit</a>

    <div class="auth-container glass-card">
        <div id="auth-tabs" style="display: flex; justify-content: center; gap: 2rem; margin-bottom: 1rem;">
            <button class="tab-btn active" id="tab-login-btn" onclick="switchTab('login')">Login</button>
            <button class="tab-btn" id="tab-register-btn" onclick="switchTab('register')">Register</button>
        </div>

        <!-- ── Login Form (Step 1) ── -->
        <form id="login-form" class="auth-form active">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="login-email" required placeholder="example@email.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password" id="login-password" required placeholder="Enter your password">
                    <i class="fas fa-eye toggle-password" onclick="togglePasswordVisibility('login-password', this)"></i>
                </div>
            </div>
            <button type="submit" id="login-btn" class="btn btn-primary btn-glow block-btn mt-2">
                <span id="login-btn-text">Sign In</span>
                <span id="login-btn-spinner" style="display:none;"><i class="fas fa-circle-notch fa-spin"></i> Sending OTP…</span>
            </button>
            <div style="text-align: center; margin-top: 1rem;">
                <a href="#" onclick="switchTab('forgot'); return false;" style="color: var(--neon-blue); text-decoration: none; font-size: 0.9rem;">Forgot Password?</a>
            </div>
            <div id="login-msg" class="error-msg"></div>
        </form>

        <!-- ── OTP Verification Step ── -->
        <div id="otp-step">
            <div class="otp-header">
                <span class="otp-icon">📧</span>
                <h3>Verify Your Identity</h3>
                <p>We sent a 6-digit OTP to<br><span class="otp-email" id="otp-display-email"></span></p>
            </div>
            <div class="otp-inputs" id="otp-boxes">
                <input type="text" maxlength="1" id="otp-0" inputmode="numeric" autocomplete="one-time-code">
                <input type="text" maxlength="1" id="otp-1" inputmode="numeric">
                <input type="text" maxlength="1" id="otp-2" inputmode="numeric">
                <input type="text" maxlength="1" id="otp-3" inputmode="numeric">
                <input type="text" maxlength="1" id="otp-4" inputmode="numeric">
                <input type="text" maxlength="1" id="otp-5" inputmode="numeric">
            </div>
            <div class="otp-timer">OTP expires in <span id="otp-countdown">10:00</span></div>
            <button id="verify-otp-btn" class="btn btn-primary btn-glow block-btn">
                <span id="verify-btn-text">Verify OTP</span>
                <span id="verify-btn-spinner" style="display:none;"><i class="fas fa-circle-notch fa-spin"></i> Verifying…</span>
            </button>
            <div id="otp-msg" class="error-msg"></div>
            <span class="resend-link">
                Didn't receive it? <button id="resend-btn" onclick="resendOTP()" disabled>Resend OTP</button>
            </span>
            <span class="back-to-login">
                <a href="#" onclick="backToLogin(); return false;">← Back to Login</a>
            </span>
        </div>

        <!-- ── Register Form ── -->
        <form id="register-form" class="auth-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="reg-name" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="reg-email" required placeholder="example@email.com">
            </div>
            <div class="form-group">
                <label>Mobile Number</label>
                <input type="tel" id="reg-mobile" required placeholder="Enter mobile number">
            </div>
            <div class="form-group">
                <label>Password (Min 8 chars, 1 uppercase, 1 symbol)</label>
                <div class="password-wrapper">
                    <input type="password" id="reg-password" required placeholder="Create a strong password">
                    <i class="fas fa-eye toggle-password" onclick="togglePasswordVisibility('reg-password', this)"></i>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-glow-green block-btn mt-2">Create Account</button>
            <div id="reg-msg" class="error-msg"></div>
        </form>

        <!-- ── Forgot Password Form ── -->
        <form id="forgot-form" class="auth-form">
            <h3 style="text-align: center; margin-bottom: 1.5rem; color: var(--text-primary);">Reset Password</h3>
            <div class="form-group">
                <label>Registered Mobile Number</label>
                <input type="tel" id="forgot-mobile" required placeholder="Enter mobile number">
            </div>
            <div class="form-group">
                <label>New Password (Min 8 chars, 1 uppercase, 1 symbol)</label>
                <div class="password-wrapper">
                    <input type="password" id="forgot-password" required placeholder="Create a new password">
                    <i class="fas fa-eye toggle-password" onclick="togglePasswordVisibility('forgot-password', this)"></i>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-glow block-btn mt-2">Reset Password</button>
            <div style="text-align: center; margin-top: 1rem;">
                <a href="#" onclick="switchTab('login'); return false;" style="color: #aaa; text-decoration: none; font-size: 0.9rem;">Back to Login</a>
            </div>
            <div id="forgot-msg" class="error-msg"></div>
        </form>
    </div>

    <script src="config.js"></script>
    <script src="auth.js"></script>
</body>
</html>
