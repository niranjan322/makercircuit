<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register - MakerCircuit</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; }
        .auth-container { width: 100%; max-width: 400px; padding: 2.5rem; margin-top: 1rem; }
        .tab-btn { background: none; border: none; font-size: 1.1rem; color: var(--text-secondary); cursor: pointer; padding: 0.5rem 1rem; border-bottom: 2px solid transparent; font-family: var(--font-heading); font-weight: 600; transition: 0.3s; }
        .tab-btn:hover { color: var(--text-primary); }
        .tab-btn.active { color: var(--neon-blue); border-bottom: 2px solid var(--neon-blue); }
        .auth-form { display: none; margin-top: 2rem; }
        .auth-form.active { display: block; animation: fadeIn 0.4s; }
        .error-msg { color: #ff4c4c; font-size: 0.9rem; margin-top: 1rem; text-align: center; }
        .success-msg { color: var(--neon-green); font-size: 0.9rem; margin-top: 1rem; text-align: center; }
        .password-wrapper { position: relative; }
        .password-wrapper input { padding-right: 40px; }
        .toggle-password { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #888; transition: 0.3s; }
        .toggle-password:hover { color: var(--neon-blue); }
        .forgot-link { display: block; text-align: right; color: var(--neon-blue); font-size: 0.85rem; margin-top: -10px; margin-bottom: 15px; text-decoration: none; cursor: pointer; }
        .forgot-link:hover { text-decoration: underline; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <a href="index.html" class="logo glow-text-blue" style="font-size: 2.5rem; text-decoration: none;">MakerCircuit</a>
    
    <div class="auth-container glass-card">
        <div id="auth-tabs" style="display: flex; justify-content: center; gap: 2rem; margin-bottom: 1rem;">
            <button class="tab-btn active" onclick="switchTab('login')">Login</button>
            <button class="tab-btn" onclick="switchTab('register')">Register</button>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="auth-form active">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="login-email" required placeholder="example@email.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password" id="login-password" required placeholder="Enter your password">
                    <i class="fas fa-eye toggle-password" onclick="togglePasswordVisibility('login-password', this)"></i>
                </div>
            </div>
            <a class="forgot-link" onclick="switchTab('forgot')">Forgot Password?</a>
            <button type="submit" class="btn btn-primary btn-glow block-btn mt-2">Sign In</button>
            <div id="login-msg" class="error-msg"></div>
        </form>

        <!-- Register Form -->
        <form id="register-form" class="auth-form">
            <div id="reg-step-1">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="reg-name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="reg-email" required placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label>Password (Min 8 chars, 1 uppercase, 1 symbol)</label>
                    <div class="password-wrapper">
                        <input type="password" id="reg-password" required placeholder="Create a strong password">
                        <i class="fas fa-eye toggle-password" onclick="togglePasswordVisibility('reg-password', this)"></i>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-glow-green block-btn mt-2">Send OTP</button>
            </div>
            <div id="reg-step-2" style="display:none;">
                <p style="text-align:center; color: var(--text-light); margin-bottom: 1rem; font-size: 0.9rem;">An OTP has been sent to your email.</p>
                <div class="form-group">
                    <label>Enter OTP</label>
                    <input type="text" id="reg-otp" placeholder="6-digit code">
                </div>
                <button type="button" onclick="verifyRegistration()" class="btn btn-primary btn-glow-green block-btn mt-2">Verify & Create Account</button>
            </div>
            <div id="reg-msg"></div>
        </form>

        <!-- Forgot Password Form -->
        <form id="forgot-form" class="auth-form">
            <h3 style="text-align:center; margin-bottom:1rem; color:var(--text-primary);">Reset Password</h3>
            <div id="forgot-step-1">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="forgot-email" required placeholder="example@email.com">
                </div>
                <button type="submit" class="btn btn-primary btn-glow block-btn mt-2">Send Reset OTP</button>
            </div>
            <div id="forgot-step-2" style="display:none;">
                <p style="text-align:center; color: var(--text-light); margin-bottom: 1rem; font-size: 0.9rem;">An OTP was sent to your email.</p>
                <div class="form-group">
                    <label>Enter OTP</label>
                    <input type="text" id="forgot-otp" placeholder="6-digit code">
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="forgot-new-password" placeholder="Enter new password">
                        <i class="fas fa-eye toggle-password" onclick="togglePasswordVisibility('forgot-new-password', this)"></i>
                    </div>
                </div>
                <button type="button" onclick="resetPassword()" class="btn btn-primary btn-glow block-btn mt-2">Confirm Reset</button>
            </div>
            <button type="button" class="btn btn-outline block-btn mt-2" onclick="switchTab('login')" style="margin-top:0.5rem; padding: 0.5rem; font-size: 0.85rem;">Back to Login</button>
            <div id="forgot-msg"></div>
        </form>
    </div>

    <script src="auth.js"></script>
</body>
</html>
